<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário de Andrade - Portal Modernista</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="diagonal-bg-pattern">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <defs>
                <pattern id="modernistStamp" width="250" height="250" patternUnits="userSpaceOnUse">
                    <path d="M30,140 C30,90 60,80 80,110 C90,125 75,160 110,160 C130,160 140,130 140,170 C140,190 30,190 30,140 Z" fill="currentColor" />
                    <circle cx="65" cy="75" r="12" fill="currentColor" />
                    <circle cx="180" cy="60" r="22" fill="currentColor" />
                    <path d="M180,20 L180,30 M180,90 L180,100 M140,60 L150,60 M210,60 L220,60" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
                    <rect x="20" y="20" width="30" height="30" fill="currentColor" transform="rotate(15 20 20)" />
                    <polygon points="120,20 150,50 100,60" fill="currentColor" />
                    <path d="M200,120 C220,120 230,140 210,160 C190,180 170,150 190,130 Z" fill="currentColor" />
                    <path d="M20,210 L20,240 M20,220 Q5,215 5,205 L5,195 M20,230 Q35,225 35,215 L35,200" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none" />
                    <path d="M90,210 L130,210 M95,218 L125,218 M100,226 L120,226" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#modernistStamp)" />
        </svg>
    </div>

    <nav class="main-nav">
        <a href="index.html" class="nav-btn active-nav">Início</a>
        <a href="biografia.html" class="nav-btn">Biografia</a>
        <a href="obras.html" class="nav-btn">Análise das Obras</a>
        <a href="legado.html" class="nav-btn">Legado 22</a>
    </nav>

    <div id="fullscreenModal" class="modal" onclick="closeModal(event)">
        <span class="close-modal" onclick="closeModal(event)">Fechar ✕</span>
        <button class="modal-arrow prev-modal" onclick="moveModalCarousel(-1, event)">&#10094;</button>
        <div class="modal-content">
            <img id="modalImg" src="" alt="Conteúdo em tela cheia">
            <div id="modalCaption" class="carousel-caption modal-caption"></div>
        </div>
        <button class="modal-arrow next-modal" onclick="moveModalCarousel(1, event)">&#10095;</button>
    </div>

    <section class="screen active">
        <header class="home-header">
            <h1>Mário de Andrade</h1>
            <p class="tagline">O Polímata da Identidade Brasileira</p>
        </header>

        <div class="carousel">
            <div class="carousel-inner" id="carouselInner">
                <div class="carousel-item active" onclick="openModal(0)">
                    <img src="slide1.jpg">
                </div>
                <div class="carousel-item" onclick="openModal(1)">
                    <img src="slide2.jpg">
                </div>
                <div class="carousel-item" onclick="openModal(2)">
                    <img src="slide3.jpg">
                </div>
                <div class="carousel-item" onclick="openModal(3)">
                    <img src="slide4.jpg">
                </div>
            </div>
            <button class="carousel-control prev" onclick="moveCarousel(-1, event)">&#10094;</button>
            <button class="carousel-control next" onclick="moveCarousel(1, event)">&#10095;</button>
        </div>
    </section>

    <footer class="main-footer">
        <p>Apresentação: Mário de Andrade - Modernismo Brasileiro</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
